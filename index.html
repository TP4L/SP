<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Data Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0e8; font-family: monospace; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #e8e0d4; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
    textarea { font-family: monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const defaultMetrics = {
      avgSpeedMin: 17, avgSpeedMax: 19,
      peakSpeedGuys: 22.5, peakBigBoys: 18.0,
      insideZoneAvgMin: 3, insideZoneAvgMax: 5,
      maxInsideZoneMin: 15, maxInsideZoneMax: 20,
      playsPerGameMin: 67, playsPerGameMax: 85,
      elitePlayers: 3,
    };

    const defaultLoad = [
      { day: "MONDAY",    label: "Film + Install",  pct: 30,  color: "#1a1a1a" },
      { day: "TUESDAY",   label: "Tempo / Curve",   pct: 55,  color: "#c9a227" },
      { day: "WEDNESDAY", label: "Full Install",    pct: 85,  color: "#8b1a1a" },
      { day: "THURSDAY",  label: "Walk-Through",    pct: 45,  color: "#c9a227" },
      { day: "FRIDAY",    label: "Game Day",        pct: 100, color: "#8b1a1a" },
    ];

    const defaultSpeedTargets = {
      speedGuys: { DB: 21.0, CB: 21.5, WR: 22.0, RB: 20.5 },
      bigBoys:   { TE: 17.0, DLine: 16.5, OLine: 15.5 },
    };

    const SPEED_COLOR = "#1a6b8a";
    const BIG_COLOR   = "#5a3e1b";

    function RangeInput({ label, value, min, max, step = 0.5, onChange, accent = "#8b1a1a" }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 11, letterSpacing: "0.08em", color: "#888" }}>{label}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: accent }}>{value}</span>
          </div>
          <input
            type="range" min={min} max={max} step={step} value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            style={{ width: "100%", accentColor: accent, cursor: "pointer" }}
          />
        </div>
      );
    }

    function MetricRow({ label, value, onEdit }) {
      return (
        <div
          onClick={onEdit}
          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid #e8e0d4", cursor: "pointer" }}
        >
          <span style={{ fontSize: 13, color: "#4a4035", letterSpacing: "0.03em" }}>{label}</span>
          <span style={{ fontSize: 16, fontWeight: 900, color: "#8b1a1a", letterSpacing: "0.04em" }}>{value}</span>
        </div>
      );
    }

    function LoadBar({ day, label, pct, color, onChange, onLabelChange }) {
      const [editingLabel, setEditingLabel] = useState(false);
      const [labelVal, setLabelVal] = useState(label);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#1a1a1a", fontWeight: 700, letterSpacing: "0.06em", minWidth: 100 }}>{day}</span>
              {editingLabel ? (
                <input autoFocus value={labelVal}
                  onChange={(e) => setLabelVal(e.target.value)}
                  onBlur={() => { setEditingLabel(false); onLabelChange(labelVal); }}
                  onKeyDown={(e) => { if (e.key === "Enter") { setEditingLabel(false); onLabelChange(labelVal); } }}
                  style={{ fontSize: 12, color: "#666", background: "transparent", border: "none", borderBottom: "1px solid #8b1a1a", outline: "none", width: 120, fontFamily: "monospace" }}
                />
              ) : (
                <span style={{ fontSize: 12, color: "#666", cursor: "text" }} onClick={() => setEditingLabel(true)}>— {labelVal}</span>
              )}
            </div>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#1a1a1a", minWidth: 40, textAlign: "right" }}>{pct}%</span>
          </div>
          <div style={{ position: "relative", height: 8, background: "#e8e0d4", borderRadius: 1 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 1, transition: "width 0.2s" }} />
          </div>
          <input type="range" min={0} max={100} value={pct} onChange={(e) => onChange(parseInt(e.target.value))}
            style={{ width: "100%", accentColor: color, cursor: "pointer" }} />
        </div>
      );
    }

    function PosBadge({ pos, color }) {
      return (
        <span style={{
          display: "inline-block", padding: "2px 7px", borderRadius: 2,
          background: color + "22", border: `1px solid ${color}55`,
          fontSize: 10, fontWeight: 700, color, letterSpacing: "0.08em",
        }}>{pos}</span>
      );
    }

    function SpeedGauge({ value, max, color, label }) {
      const pct = Math.min((value / max) * 100, 100);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 11, color: "#666" }}>{label}</span>
            <span style={{ fontSize: 12, fontWeight: 900, color }}>{value} MPH</span>
          </div>
          <div style={{ height: 5, background: "#e8e0d4", borderRadius: 1 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 1, transition: "width 0.2s" }} />
          </div>
        </div>
      );
    }

    function PosSpeedRow({ pos, value, groupColor, onChange }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{ borderBottom: "1px solid #e8e0d4" }}>
          <div
            style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 16px", cursor: "pointer" }}
            onClick={() => setOpen(o => !o)}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <PosBadge pos={pos} color={groupColor} />
              <span style={{ fontSize: 11, color: "#888" }}>target this week</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 15, fontWeight: 900, color: groupColor }}>{value} MPH</span>
              <span style={{ fontSize: 10, color: "#aaa" }}>{open ? "▲" : "▼"}</span>
            </div>
          </div>
          {open && (
            <div style={{ padding: "8px 16px 14px", background: "#f0ebe0" }}>
              <RangeInput label="MPH Target" value={value} min={12} max={28} step={0.5} onChange={onChange} accent={groupColor} />
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [metrics, setMetrics] = useState(defaultMetrics);
      const [load, setLoad] = useState(defaultLoad);
      const [editingMetric, setEditingMetric] = useState(null);
      const [speedTargets, setSpeedTargets] = useState(defaultSpeedTargets);
      const [note, setNote] = useState("If they're a heavy run team, we don't sprint as much this week — do more tempo and curve work. KYP shapes the load.");
      const [editingNote, setEditingNote] = useState(false);

      const setM = (key) => (val) => setMetrics((m) => ({ ...m, [key]: val }));
      const setPosSpeed = (group, pos, val) =>
        setSpeedTargets(prev => ({ ...prev, [group]: { ...prev[group], [pos]: val } }));

      const metricRows = [
        {
          label: "Avg. Speed (short plays)",
          value: `${metrics.avgSpeedMin}–${metrics.avgSpeedMax} MPH`,
          controls: [
            { label: "Min", key: "avgSpeedMin", min: 10, max: 30, step: 0.5 },
            { label: "Max", key: "avgSpeedMax", min: 10, max: 35, step: 0.5 },
          ],
        },
        {
          label: "Inside Zone avg. gain",
          value: `${metrics.insideZoneAvgMin}–${metrics.insideZoneAvgMax} YDS`,
          controls: [
            { label: "Min", key: "insideZoneAvgMin", min: 1, max: 15, step: 1 },
            { label: "Max", key: "insideZoneAvgMax", min: 1, max: 20, step: 1 },
          ],
        },
        {
          label: "Max inside zone gain",
          value: `${metrics.maxInsideZoneMin}–${metrics.maxInsideZoneMax} YDS`,
          controls: [
            { label: "Min", key: "maxInsideZoneMin", min: 5, max: 40, step: 1 },
            { label: "Max", key: "maxInsideZoneMax", min: 5, max: 50, step: 1 },
          ],
        },
        {
          label: "Plays per game (range)",
          value: `${metrics.playsPerGameMin}–${metrics.playsPerGameMax}`,
          controls: [
            { label: "Min", key: "playsPerGameMin", min: 40, max: 100, step: 1 },
            { label: "Max", key: "playsPerGameMax", min: 40, max: 120, step: 1 },
          ],
        },
        {
          label: "Opposing elite players (10 games)",
          value: `≈${metrics.elitePlayers} GAMES`,
          controls: [{ label: "Count", key: "elitePlayers", min: 0, max: 10, step: 1 }],
        },
      ];

      const sgAvg = (Object.values(speedTargets.speedGuys).reduce((a, b) => a + b, 0) / Object.values(speedTargets.speedGuys).length).toFixed(1);
      const bbAvg = (Object.values(speedTargets.bigBoys).reduce((a, b) => a + b, 0) / Object.values(speedTargets.bigBoys).length).toFixed(1);

      const sectionLabel = (text) => (
        <div style={{ fontSize: 10, letterSpacing: "0.15em", color: "#888", marginBottom: 10, fontWeight: 700 }}>{text}</div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#f5f0e8", padding: "36px 20px" }}>
          <div style={{ maxWidth: 980, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#8b1a1a", fontWeight: 700, marginBottom: 6 }}>PERFORMANCE ANALYTICS</div>
              <h1 style={{ fontSize: 22, fontWeight: 900, color: "#1a1a1a", letterSpacing: "0.04em" }}>GAME DATA DASHBOARD</h1>
              <p style={{ margin: "8px 0 0", fontSize: 12, color: "#666", lineHeight: 1.7, maxWidth: 560 }}>
                GPS speed outputs, yardage per play type, tonnage — practice mirrors what your athletes actually do.
              </p>
            </div>

            {/* PEAK SPEED BY GROUP */}
            <div style={{ marginBottom: 24 }}>
              {sectionLabel("PEAK SPEED BY GROUP")}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>

                <div style={{ background: "#faf7f2", border: `1.5px solid ${SPEED_COLOR}`, overflow: "hidden" }}>
                  <div style={{ background: SPEED_COLOR, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 9, letterSpacing: "0.18em", color: "#a8d4e6", fontWeight: 700 }}>SPEED GUYS</div>
                      <div style={{ fontSize: 11, color: "#cceeff", letterSpacing: "0.05em", marginTop: 2 }}>DB · CB · WR · RB</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{metrics.peakSpeedGuys}</div>
                      <div style={{ fontSize: 11, color: "#a8d4e6", letterSpacing: "0.1em" }}>MPH PEAK</div>
                    </div>
                  </div>
                  <div style={{ padding: "14px 16px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
                    <SpeedGauge value={metrics.peakSpeedGuys} max={30} color={SPEED_COLOR} label="Peak speed (loss plays)" />
                    <RangeInput label="Adjust peak" value={metrics.peakSpeedGuys} min={15} max={30} step={0.5} onChange={setM("peakSpeedGuys")} accent={SPEED_COLOR} />
                  </div>
                </div>

                <div style={{ background: "#faf7f2", border: `1.5px solid ${BIG_COLOR}`, overflow: "hidden" }}>
                  <div style={{ background: BIG_COLOR, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 9, letterSpacing: "0.18em", color: "#d4b896", fontWeight: 700 }}>BIG BOYS</div>
                      <div style={{ fontSize: 11, color: "#ffe0b8", letterSpacing: "0.05em", marginTop: 2 }}>Tight Ends · DLine · OLine</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{metrics.peakBigBoys}</div>
                      <div style={{ fontSize: 11, color: "#d4b896", letterSpacing: "0.1em" }}>MPH PEAK</div>
                    </div>
                  </div>
                  <div style={{ padding: "14px 16px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
                    <SpeedGauge value={metrics.peakBigBoys} max={25} color={BIG_COLOR} label="Peak speed (loss plays)" />
                    <RangeInput label="Adjust peak" value={metrics.peakBigBoys} min={12} max={25} step={0.5} onChange={setM("peakBigBoys")} accent={BIG_COLOR} />
                  </div>
                </div>
              </div>
            </div>

            {/* SPEED THIS WEEK */}
            <div style={{ marginBottom: 28 }}>
              {sectionLabel("SPEED THIS WEEK — BY POSITION")}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>

                <div style={{ background: "#faf7f2", border: `1.5px solid ${SPEED_COLOR}` }}>
                  <div style={{ padding: "9px 16px", borderBottom: `1px solid ${SPEED_COLOR}33`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 7, height: 7, background: SPEED_COLOR, borderRadius: "50%" }} />
                      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: SPEED_COLOR }}>SPEED GUYS</span>
                    </div>
                    <span style={{ fontSize: 10, color: "#888" }}>GROUP AVG: <strong style={{ color: SPEED_COLOR }}>{sgAvg} MPH</strong></span>
                  </div>
                  {Object.entries(speedTargets.speedGuys).map(([pos, val]) => (
                    <PosSpeedRow key={pos} pos={pos} value={val} groupColor={SPEED_COLOR}
                      onChange={(v) => setPosSpeed("speedGuys", pos, v)} />
                  ))}
                </div>

                <div style={{ background: "#faf7f2", border: `1.5px solid ${BIG_COLOR}` }}>
                  <div style={{ padding: "9px 16px", borderBottom: `1px solid ${BIG_COLOR}33`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 7, height: 7, background: BIG_COLOR, borderRadius: "50%" }} />
                      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: BIG_COLOR }}>BIG BOYS</span>
                    </div>
                    <span style={{ fontSize: 10, color: "#888" }}>GROUP AVG: <strong style={{ color: BIG_COLOR }}>{bbAvg} MPH</strong></span>
                  </div>
                  {Object.entries(speedTargets.bigBoys).map(([pos, val]) => (
                    <PosSpeedRow key={pos} pos={pos} value={val} groupColor={BIG_COLOR}
                      onChange={(v) => setPosSpeed("bigBoys", pos, v)} />
                  ))}
                </div>
              </div>
              <div style={{ marginTop: 7, fontSize: 10, color: "#aaa", letterSpacing: "0.05em" }}>↑ CLICK ANY POSITION ROW TO ADJUST SPEED TARGET</div>
            </div>

            {/* BOTTOM: Metrics + Load */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32 }}>

              <div>
                {sectionLabel("GAME METRICS")}
                <div style={{ border: "1.5px solid #1a1a1a", background: "#faf7f2" }}>
                  {metricRows.map((row, i) => (
                    <div key={i}>
                      <MetricRow label={row.label} value={row.value}
                        onEdit={() => setEditingMetric(editingMetric === i ? null : i)} />
                      {editingMetric === i && (
                        <div style={{ padding: "14px 20px 16px", background: "#f0ebe0", borderBottom: "1px solid #e8e0d4", display: "flex", flexDirection: "column", gap: 12 }}>
                          {row.controls.map((ctrl) => (
                            <RangeInput key={ctrl.key} label={ctrl.label} value={metrics[ctrl.key]}
                              min={ctrl.min} max={ctrl.max} step={ctrl.step} onChange={setM(ctrl.key)} />
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 10, fontSize: 10, color: "#aaa", letterSpacing: "0.05em" }}>↑ CLICK ANY ROW TO ADJUST</div>
              </div>

              <div>
                {sectionLabel("WEEKLY PRACTICE LOAD MODEL")}
                <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                  {load.map((day, i) => (
                    <LoadBar key={day.day} {...day}
                      onChange={(val) => setLoad((prev) => prev.map((d, j) => (j === i ? { ...d, pct: val } : d)))}
                      onLabelChange={(val) => setLoad((prev) => prev.map((d, j) => (j === i ? { ...d, label: val } : d)))}
                    />
                  ))}
                </div>

                <div style={{ marginTop: 24, padding: "14px 16px", borderLeft: "3px solid #c9a227", background: "#faf7f2" }}>
                  {editingNote ? (
                    <textarea autoFocus value={note} onChange={(e) => setNote(e.target.value)} onBlur={() => setEditingNote(false)}
                      style={{ width: "100%", fontSize: 12, color: "#555", lineHeight: 1.7, background: "transparent", border: "none", outline: "none", resize: "vertical", minHeight: 60 }} />
                  ) : (
                    <p style={{ fontSize: 12, color: "#555", lineHeight: 1.7, fontStyle: "italic", cursor: "text" }} onClick={() => setEditingNote(true)}>"{note}"</p>
                  )}
                  {!editingNote && <div style={{ marginTop: 6, fontSize: 10, color: "#aaa", letterSpacing: "0.05em" }}>↑ CLICK TO EDIT NOTE</div>}
                </div>

                <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {[
                    { label: "AVG LOAD", value: `${Math.round(load.reduce((s, d) => s + d.pct, 0) / load.length)}%` },
                    { label: "PEAK DAY", value: load.reduce((a, b) => (a.pct > b.pct ? a : b)).day },
                  ].map((stat) => (
                    <div key={stat.label} style={{ padding: "12px 14px", background: "#1a1a1a", color: "#f5f0e8" }}>
                      <div style={{ fontSize: 9, letterSpacing: "0.15em", color: "#888", marginBottom: 4 }}>{stat.label}</div>
                      <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: "0.04em" }}>{stat.value}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
